name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          out="tcd${ext}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$out" ./cmd/tcd

          pkg="tcd_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "$pkg"
          cp "$out" "$pkg/"
          cp README.md LICENSE install.sh "$pkg/" 2>/dev/null || true

          if [ "$GOOS" = "windows" ]; then
            (cd "$pkg" && zip -r "../dist/${pkg}.zip" .)
          else
            tar -C . -czf "dist/${pkg}.tar.gz" "$pkg"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum tcd_* > SHA256SUMS
          cat SHA256SUMS
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tcd_*
            dist/SHA256SUMS
          generate_release_notes: true
