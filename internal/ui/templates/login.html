{{define "login.html"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>tcd — login</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafafa; color: #1a1a1a; margin: 0; display: flex; min-height: 100vh; align-items: center; justify-content: center; }
  @media (prefers-color-scheme: dark) { body { background: #0f0f11; color: #e8e8e8; } .card { background: #1a1a1d !important; border-color: #2a2a2d !important; } input { background: #1a1a1d !important; color: #e8e8e8 !important; border-color: #2a2a2d !important; } }
  .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 32px; width: 360px; box-shadow: 0 4px 12px rgba(0,0,0,.04); }
  h1 { margin: 0 0 4px; font-size: 20px; }
  .sub { color: #666; font-size: 13px; margin-bottom: 24px; }
  label { display: block; margin-bottom: 4px; font-size: 13px; color: #666; }
  input { width: 100%; padding: 10px; border: 1px solid #e5e5e5; border-radius: 6px; font-size: 14px; box-sizing: border-box; margin-bottom: 12px; }
  button { width: 100%; padding: 10px; background: #2563eb; color: #fff; border: 0; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:hover { background: #1d4ed8; }
  .err { color: #dc2626; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<form class="card" method="POST" action="/login">
  <h1>tcd</h1>
  <p class="sub">Sign in to manage deployments.</p>
  {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
  <input type="hidden" name="next" value="{{.Next}}">
  <label>Username</label>
  <input type="text" name="user" autocomplete="username" autofocus required>
  <label>Password</label>
  <input type="password" name="password" autocomplete="current-password" required>
  <button type="submit">Sign in</button>
</form>
</body>
</html>{{end}}
