{{define "base"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{block "title" .}}tcd{{end}}</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
  :root {
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #666;
    --accent: #2563eb;
    --danger: #dc2626;
    --border: #e5e5e5;
    --card: #fff;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0f0f11; --fg: #e8e8e8; --muted: #999; --border: #2a2a2d; --card: #1a1a1d; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); }
  header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header h1 a { color: inherit; text-decoration: none; }
  header .meta { color: var(--muted); font-size: 13px; }
  main { max-width: 1100px; margin: 0 auto; padding: 24px; }
  h2 { font-size: 15px; font-weight: 600; margin: 24px 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  th { font-weight: 600; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  td code, code.mono { font-family: var(--mono); font-size: 13px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .btn { display: inline-block; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--fg); font-size: 13px; cursor: pointer; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  form.inline { display: inline; }
  input[type=text], input[type=number], textarea, select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--fg); font-family: inherit; font-size: 14px; }
  textarea { font-family: var(--mono); min-height: 100px; }
  label { display: block; margin-bottom: 4px; font-size: 13px; color: var(--muted); }
  .field { margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
  .kv { display: grid; grid-template-columns: 140px 1fr; gap: 6px 16px; font-size: 14px; }
  .kv dt { color: var(--muted); }
  .kv dd { margin: 0; font-family: var(--mono); font-size: 13px; word-break: break-all; }
  pre.log { background: #000; color: #ccc; padding: 12px; border-radius: 6px; font-family: var(--mono); font-size: 12px; height: 400px; overflow-y: scroll; margin: 0; }
</style>
</head>
<body>
<header>
  <h1><a href="/">tcd</a></h1>
  <span class="meta">{{block "meta" .}}{{end}}</span>
  <span style="margin-left: auto; color: var(--muted); font-size: 13px;">
    {{if .User}}
      <a href="/settings">{{.User}}</a>
      ·
      <form class="inline" method="POST" action="/logout" style="display: inline;">
        <button class="btn" type="submit" style="padding: 4px 8px; font-size: 12px;">log out</button>
      </form>
    {{end}}
  </span>
</header>
<main>
{{block "content" .}}{{end}}
</main>
</body>
</html>{{end}}
